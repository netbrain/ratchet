<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratchet Monitor</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --bg-surface: #0f3460;
            --text: #e0e0e0;
            --text-muted: #8a8a9a;
            --border: #2a2a4a;
            --accent: #53a8b6;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --gray: #6b7280;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }
        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .conn-status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .status-connecting   { background: var(--yellow); }
        .status-reconnecting { background: var(--yellow); animation: pulse 1s infinite; }
        .status-disconnected { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Epic status bar */
        .epic-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.5rem 1.5rem;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            flex-wrap: wrap;
        }
        .epic-bar .milestone-name {
            font-weight: 600;
            color: var(--accent);
        }
        .phase-list {
            display: flex;
            gap: 0.75rem;
            list-style: none;
        }
        .phase-list li {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .phase-icon { font-size: 0.7rem; }

        /* Main layout */
        .main {
            padding: 1rem 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Nav tabs */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .nav-tab {
            padding: 0.4rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .nav-tab:hover { border-color: var(--accent); color: var(--text); }
        .nav-tab.active {
            background: var(--bg-surface);
            border-color: var(--accent);
            color: var(--text);
        }

        /* Pair cards grid */
        .pairs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .pair-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.1s;
        }
        .pair-card:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        .pair-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }
        .pair-card .pair-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }
        .pair-card .pair-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .badge-consensus  { background: rgba(34,197,94,0.2);  color: var(--green); }
        .badge-debating   { background: rgba(234,179,8,0.2);  color: var(--yellow); }
        .badge-escalated  { background: rgba(239,68,68,0.2);  color: var(--red); }
        .badge-idle       { background: rgba(107,114,128,0.2); color: var(--gray); }
        .badge-resolved   { background: rgba(34,197,94,0.2);  color: var(--green); }
        .badge-started    { background: rgba(234,179,8,0.2);  color: var(--yellow); }
        .badge-pending    { background: rgba(107,114,128,0.2); color: var(--gray); }
        .badge-in_progress { background: rgba(234,179,8,0.2);  color: var(--yellow); }
        .badge-initiated  { background: rgba(83,168,182,0.2);  color: var(--accent); }

        /* Debate table */
        .debate-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .debate-table th {
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .debate-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .debate-table tr {
            cursor: pointer;
            transition: background 0.1s;
        }
        .debate-table tbody tr:hover {
            background: var(--bg-surface);
        }

        /* Debate viewer */
        .debate-viewer {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1rem;
            height: calc(100vh - 180px);
        }
        .debate-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-y: auto;
        }
        .debate-sidebar h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            padding: 0.35rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }
        .meta-row .label { color: var(--text-muted); }
        .meta-row .value { font-weight: 600; }

        .debate-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow-y: auto;
            padding: 1rem;
        }
        .round-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .round-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .round-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
        }
        .role-tag {
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .role-generative  { background: rgba(83,168,182,0.2); color: var(--accent); }
        .role-adversarial  { background: rgba(239,68,68,0.2);  color: var(--red); }

        /* Markdown content styling */
        .md-content h1, .md-content h2, .md-content h3,
        .md-content h4, .md-content h5, .md-content h6 {
            margin: 0.75rem 0 0.4rem;
            color: var(--text);
        }
        .md-content h1 { font-size: 1.2rem; }
        .md-content h2 { font-size: 1.05rem; }
        .md-content h3 { font-size: 0.95rem; }
        .md-content p { margin: 0.4rem 0; line-height: 1.6; }
        .md-content ul, .md-content ol {
            margin: 0.4rem 0;
            padding-left: 1.5rem;
        }
        .md-content li { margin: 0.2rem 0; }
        .md-content code {
            background: rgba(255,255,255,0.08);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-size: 0.85em;
        }
        .md-content pre {
            background: rgba(0,0,0,0.3);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .md-content pre code {
            background: none;
            padding: 0;
        }
        .md-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 0.75rem;
            color: var(--text-muted);
            margin: 0.5rem 0;
        }
        .md-content a { color: var(--accent); }
        .md-content table {
            border-collapse: collapse;
            margin: 0.5rem 0;
        }
        .md-content th, .md-content td {
            border: 1px solid var(--border);
            padding: 0.3rem 0.5rem;
            font-size: 0.85rem;
        }

        /* Back button */
        .back-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 0.75rem;
            transition: all 0.15s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--text); }

        /* Loading / empty states */
        .loading, .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 1rem;
            font-size: 0.85rem;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid var(--text-muted);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Section headings */
        .section-heading {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-heading .clear-filter {
            font-size: 0.7rem;
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            font-family: inherit;
        }

        /* Score summary cards */
        .score-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .score-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
        }
        .score-card .sc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .score-card .sc-pair {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .score-card .sc-trend {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .trend-improving { color: var(--green); }
        .trend-stable    { color: var(--text-muted); }
        .trend-degrading { color: var(--red); }
        .sc-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .sc-metric {
            text-align: center;
        }
        .sc-metric .sc-val {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sc-metric .sc-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .sc-sparkline {
            margin-top: 0.25rem;
        }

        /* Filter bar for debates */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-select {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.3rem 0.5rem;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Issue ref badge in epic bar */
        .issue-ref-badge {
            color: var(--accent);
            font-weight: 500;
        }
        .workspace-label {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        /* Milestone cards */
        .milestone-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .milestone-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.1s;
        }
        .milestone-header:hover {
            background: var(--bg-surface);
        }
        .milestone-expand {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .milestone-expand.open {
            transform: rotate(90deg);
        }
        .ms-name {
            font-weight: 600;
            font-size: 0.9rem;
            flex: 1;
        }
        .ms-meta {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            font-size: 0.75rem;
        }
        .ms-deps {
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        .regression-counter {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .regression-counter.warn {
            background: rgba(239,68,68,0.2);
            color: var(--red);
        }
        .regression-counter.ok {
            background: rgba(107,114,128,0.15);
            color: var(--gray);
        }

        /* Issue rows */
        .issue-list {
            border-top: 1px solid var(--border);
        }
        .issue-row {
            display: grid;
            grid-template-columns: 2fr 1fr 2fr 1fr;
            gap: 0.5rem;
            align-items: center;
            padding: 0.5rem 1rem 0.5rem 2.25rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }
        .issue-row:last-child {
            border-bottom: none;
        }
        .issue-ref {
            font-weight: 600;
            color: var(--accent);
        }
        .issue-title {
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .phase-pills {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .phase-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.15rem;
            padding: 0.05rem 0.4rem;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .phase-pill.done        { background: rgba(34,197,94,0.2);  color: var(--green); }
        .phase-pill.in_progress { background: rgba(234,179,8,0.2);  color: var(--yellow); }
        .phase-pill.pending     { background: rgba(107,114,128,0.15); color: var(--gray); }
        .phase-pill.skipped     { background: rgba(107,114,128,0.1); color: var(--gray); text-decoration: line-through; }
        .issue-deps {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Discoveries section */
        .discoveries-section {
            margin-top: 1.5rem;
        }
        .discovery-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }
        .discovery-item .disc-title {
            font-weight: 600;
            margin-bottom: 0.2rem;
        }
        .discovery-item .disc-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .discovery-item.sidequest {
            border-left-color: var(--yellow);
        }
        .discovery-item.blocker {
            border-left-color: var(--red);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pairs-grid, .score-cards {
                grid-template-columns: 1fr;
            }
            .debate-viewer {
                grid-template-columns: 1fr;
                height: auto;
            }
            .debate-sidebar {
                order: -1;
            }
            .header {
                flex-direction: column;
                gap: 0.5rem;
                align-items: flex-start;
            }
            .epic-bar {
                flex-direction: column;
                gap: 0.5rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div x-data="dashboard()" x-init="init()">

    <!-- Header -->
    <header class="header">
        <h1>Ratchet Monitor</h1>
        <div class="conn-status" aria-live="polite" role="status">
            <span class="status-dot" :class="'status-' + status"></span>
            <span x-text="status"></span>
        </div>
    </header>

    <!-- Epic status bar -->
    <div class="epic-bar" x-show="plan">
        <span>
            Milestone: <span class="milestone-name" x-text="currentMilestone"></span>
        </span>
        <template x-if="currentIssueRef">
            <span class="issue-ref-badge">
                Issue: <strong x-text="currentIssueRef"></strong>
                <template x-if="currentPhase">
                    <span> / <span x-text="currentPhase"></span></span>
                </template>
            </span>
        </template>
        <template x-if="currentPhases.length > 0">
            <ul class="phase-list">
                <template x-for="phase in currentPhases" :key="phase.name">
                    <li>
                        <span class="phase-icon"
                              x-text="phase.status === 'done' ? '\u2713' : phase.status === 'in_progress' ? '\u25CF' : '\u25CB'"></span>
                        <span x-text="phase.name"></span>
                    </li>
                </template>
            </ul>
        </template>
        <template x-if="activeWorkspace">
            <span class="workspace-label">Workspace: <strong x-text="activeWorkspace"></strong></span>
        </template>
    </div>

    <!-- Main content -->
    <main class="main">

        <!-- Nav tabs -->
        <nav class="nav-tabs" role="tablist" aria-label="Dashboard views">
            <button class="nav-tab" :class="{ active: view === 'overview' }"
                    @click="view = 'overview'; location.hash = ''"
                    role="tab" :aria-selected="view === 'overview'" id="tab-overview">Overview</button>
            <button class="nav-tab" :class="{ active: view === 'plan' }"
                    @click="view = 'plan'; location.hash = 'plan'"
                    role="tab" :aria-selected="view === 'plan'" id="tab-plan">Plan</button>
            <button class="nav-tab" :class="{ active: view === 'scores' }"
                    @click="view = 'scores'; location.hash = 'scores'"
                    role="tab" :aria-selected="view === 'scores'" id="tab-scores">Scores</button>
            <button class="nav-tab" :class="{ active: view === 'debate' }"
                    x-show="view === 'debate'"
                    role="tab" :aria-selected="view === 'debate'" id="tab-debate">Debate Viewer</button>
        </nav>

        <!-- Overview -->
        <div x-show="view === 'overview'" role="tabpanel" aria-labelledby="tab-overview">

            <!-- Loading state -->
            <div x-show="loading" class="loading">Loading</div>

            <!-- Error state -->
            <div x-show="!loading && fetchError" class="empty-state" style="color: var(--red);">
                Unable to reach the API. Is the server running?
                <br><button class="back-btn" style="margin-top: 0.5rem;" @click="fetchAll()">Retry</button>
            </div>

            <template x-if="!loading && !fetchError">
                <div>
                    <!-- Pair cards -->
                    <div class="section-heading">
                        <span>Pairs (<span x-text="pairs.length"></span>)</span>
                    </div>

                    <div x-show="pairs.length === 0" class="empty-state">No pairs configured</div>

                    <div class="pairs-grid" x-show="pairs.length > 0">
                        <template x-for="pair in pairs" :key="pair.name || pair.id">
                            <div class="pair-card"
                                 :class="{ selected: filter === (pair.name || pair.id) }"
                                 @click="filter = filter === (pair.name || pair.id) ? null : (pair.name || pair.id)"
                                 @keydown.enter="filter = filter === (pair.name || pair.id) ? null : (pair.name || pair.id)"
                                 tabindex="0"
                                 role="button"
                                 :aria-pressed="filter === (pair.name || pair.id)">
                                <div class="pair-name" x-text="pair.name || pair.id"></div>
                                <div class="pair-meta">
                                    <span x-show="pair.component" x-text="pair.component"></span>
                                    <span x-show="pair.phase" x-text="pair.phase"></span>
                                    <span class="badge"
                                          :class="'badge-' + (pair.status || 'idle')"
                                          x-text="pair.status || 'idle'"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Debates list -->
                    <div class="section-heading">
                        <span>
                            Debates (<span x-text="filteredDebates.length"></span>)
                            <template x-if="filter">
                                <span> &mdash; filtered by <strong x-text="filter"></strong></span>
                            </template>
                        </span>
                        <div class="filter-bar">
                            <select class="filter-select" x-model="historyFilters.status">
                                <option value="">All statuses</option>
                                <option value="consensus">Consensus</option>
                                <option value="escalated">Escalated</option>
                                <option value="in_progress">In Progress</option>
                                <option value="initiated">Initiated</option>
                            </select>
                            <button class="clear-filter" x-show="filter || historyFilters.status"
                                    @click="filter = null; historyFilters.status = ''">clear filters</button>
                        </div>
                    </div>

<!-- Vendored libraries (load from local, fallback to CDN) -->
<script src="/static/vendor/marked.min.js"
        onerror="var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/marked/marked.min.js';document.head.appendChild(s);"></script>
<script defer src="/static/vendor/alpine.min.js"
        onerror="var s=document.createElement('script');s.defer=true;s.src='https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js';document.head.appendChild(s);"></script>

<script>
    function dashboard() {
        return {
            // State
            view: 'overview',
            status: 'disconnected',
            pairs: [],
            debates: [],
            scores: [],
            currentDebate: null,
            plan: null,
            filter: null,
            historyFilters: { status: '' },
            loading: true,
            fetchError: false,
            scoresError: false,
            _source: null,
            _statusInfo: null,
            _debateRefreshTimer: null,
            _scoreRefreshTimer: null,
            _hashHandler: null,
            _unloadHandler: null,
            _scoresAbort: null,
            activeWorkspace: null,

            // Computed
            get filteredDebates() {
                let result = this.debates;
                if (this.filter) {
                    result = result.filter(d =>
                        (d.pair || d.pair_name || '') === this.filter
                    );
                }
                if (this.historyFilters.status) {
                    result = result.filter(d =>
                        (d.status || '') === this.historyFilters.status
                    );
                }
                return result;
            },

            get currentMilestone() {
                if (!this.plan || !this.plan.epic) return '—';
                const focus = this.plan.epic.current_focus;
                if (!focus) return '—';
                const ms = (this.plan.epic.milestones || []).find(m => m.id === focus.milestone_id);
                return ms ? ms.name : '—';
            },

            get currentIssueRef() {
                if (!this.plan || !this.plan.epic) return '';
                const focus = this.plan.epic.current_focus;
                return focus ? (focus.issue_ref || '') : '';
            },

            get currentPhase() {
                if (!this.plan || !this.plan.epic) return '';
                const focus = this.plan.epic.current_focus;
                return focus ? (focus.phase || '') : '';
            },

            get currentPhases() {
                if (!this.plan || !this.plan.epic) return [];
                const focus = this.plan.epic.current_focus;
                if (!focus) return [];
                // v2: find the focused issue and use its phase_status
                const ms = (this.plan.epic.milestones || []).find(m => m.id === focus.milestone_id);
                if (!ms) return [];
                if (focus.issue_ref && ms.issues) {
                    const issue = ms.issues.find(i => i.ref === focus.issue_ref);
                    if (issue && issue.phase_status) {
                        const order = ['plan', 'test', 'build', 'review', 'harden'];
                        return order.filter(p => p in issue.phase_status).map(p => ({
                            name: p,
                            status: issue.phase_status[p]
                        }));
                    }
                }
                // Fallback to milestone-level phase_status (v1 compat)
                if (ms.phase_status) {
                    const order = ['plan', 'test', 'build', 'review', 'harden'];
                    return order.filter(p => p in ms.phase_status).map(p => ({
                        name: p,
                        status: ms.phase_status[p]
                    }));
                }
                return [];
            },

            get scoreSummaries() {
                if (!this.scores || this.scores.length === 0) return [];
                // Group by pair
                const byPair = {};
                for (const s of this.scores) {
                    if (!s.pair) continue; // Skip entries without a pair name
                    if (!byPair[s.pair]) byPair[s.pair] = [];
                    byPair[s.pair].push(s);
                }
                const summaries = [];
                for (const [pair, entries] of Object.entries(byPair)) {
                    // Scores arrive sorted by timestamp desc from API
                    const sorted = [...entries].sort((a, b) =>
                        new Date(a.timestamp) - new Date(b.timestamp)
                    );
                    const total = sorted.length;
                    const consensusCount = sorted.filter(e => !e.escalated).length;
                    const consensusRate = total > 0 ? Math.round((consensusCount / total) * 100) : 0;
                    const roundsSum = sorted.reduce((acc, e) => acc + (e.rounds_to_consensus || 0), 0);
                    const avgRounds = total > 0 ? (roundsSum / total).toFixed(1) : '0';
                    const issuesFound = sorted.reduce((acc, e) => acc + (e.issues_found || 0), 0);
                    const issuesResolved = sorted.reduce((acc, e) => acc + (e.issues_resolved || 0), 0);
                    const resolutionRate = issuesFound > 0 ? Math.round((issuesResolved / issuesFound) * 100) : 0;
                    // Trend: compare last 5 vs previous 5 avg rounds_to_consensus
                    const recent5 = sorted.slice(-5);
                    const prev5 = sorted.slice(Math.max(0, sorted.length - 10), Math.max(0, sorted.length - 5));
                    let trend = 'stable';
                    if (recent5.length >= 2 && prev5.length >= 2) {
                        const recentAvg = recent5.reduce((a, e) => a + (e.rounds_to_consensus || 0), 0) / recent5.length;
                        const prevAvg = prev5.reduce((a, e) => a + (e.rounds_to_consensus || 0), 0) / prev5.length;
                        const diff = recentAvg - prevAvg;
                        if (diff < -0.5) trend = 'improving';
                        else if (diff > 0.5) trend = 'degrading';
                    }
                    // Rounds trend data for sparkline (chronological order)
                    const roundsTrend = sorted.map(e => e.rounds_to_consensus || 0);
                    summaries.push({
                        pair, totalDebates: total, consensusRate, avgRounds,
                        issuesFound, issuesResolved, resolutionRate,
                        trend, roundsTrend,
                    });
                }
                summaries.sort((a, b) => a.pair.localeCompare(b.pair));
                return summaries;
            },

            // Methods
            async init() {
                this.connectSSE();
                await this.fetchAll();
                this.handleHash();
                this._hashHandler = () => this.handleHash();
                window.addEventListener('hashchange', this._hashHandler);
                // Cleanup on page unload to prevent leaked connections
                this._unloadHandler = () => this.destroy();
                window.addEventListener('beforeunload', this._unloadHandler);
            },

            destroy() {
                if (this._source) {
                    this._source.close();
                    this._source = null;
                }
                if (this._hashHandler) {
                    window.removeEventListener('hashchange', this._hashHandler);
                    this._hashHandler = null;
                }
                if (this._unloadHandler) {
                    window.removeEventListener('beforeunload', this._unloadHandler);
                    this._unloadHandler = null;
                }
                if (this._debateRefreshTimer) {
                    clearTimeout(this._debateRefreshTimer);
                }
                if (this._scoreRefreshTimer) {
                    clearTimeout(this._scoreRefreshTimer);
                }
                if (this._scoresAbort) {
                    this._scoresAbort.abort();
                    this._scoresAbort = null;
                }
            },

            connectSSE() {
                // Close any previous connection before opening a new one
                if (this._source) {
                    this._source.close();
                    this._source = null;
                }
                this.status = 'connecting';
                const source = new EventSource('/events');
                this._source = source;

                source.onopen = () => {
                    const wasReconnecting = this.status === 'reconnecting';
                    this.status = 'connected';
                    if (wasReconnecting) {
                        this.fetchAll();
                    }
                };

                source.onerror = () => {
                    if (source.readyState === EventSource.CONNECTING) {
                        this.status = 'reconnecting';
                    } else {
                        this.status = 'disconnected';
                    }
                };

                // Domain event listeners
                const domainTypes = [
                    'debate:started', 'debate:updated', 'debate:resolved',
                    'score:updated', 'config:changed', 'plan:updated', 'pair:modified'
                ];

                domainTypes.forEach(type => {
                    source.addEventListener(type, (e) => {
                        let data;
                        try {
                            data = JSON.parse(e.data);
                        } catch (err) {
                            console.warn('SSE: malformed JSON in', type, err);
                            return;
                        }
                        this.handleDomainEvent(type, data);
                    });
                });

                // Backward-compat file events
                const fileTypes = ['file:created', 'file:modified', 'file:deleted'];
                fileTypes.forEach(type => {
                    source.addEventListener(type, (e) => {
                        // File events kept for compatibility; no-op in dashboard
                    });
                });
            },

            handleDomainEvent(type, data) {
                // Track workspace context from SSE events
                if (data && data.workspace) {
                    this.activeWorkspace = data.workspace;
                }
                if (type === 'config:changed' || type === 'pair:modified') {
                    this.fetchPairs();
                } else if (type.startsWith('debate:')) {
                    if (data && data.data) {
                        this.upsertById(this.debates, data.data);
                    } else if (data && data.id) {
                        this.upsertById(this.debates, data);
                    }
                    // If we're viewing this debate, refresh it (debounced to avoid SSE flood)
                    if (this.currentDebate && data) {
                        const debateId = (data.data && data.data.id) || data.id;
                        if (debateId && debateId === this.currentDebate.id) {
                            clearTimeout(this._debateRefreshTimer);
                            this._debateRefreshTimer = setTimeout(() => this.fetchDebate(debateId), 250);
                        }
                    }
                } else if (type === 'plan:updated') {
                    this.fetchPlan();
                } else if (type === 'score:updated') {
                    this.fetchPairs();
                    // Debounce score fetches to avoid churn on rapid SSE bursts
                    clearTimeout(this._scoreRefreshTimer);
                    this._scoreRefreshTimer = setTimeout(() => this.fetchScores(), 250);
                }
            },

            async fetchAll() {
                this.loading = true;
                this.fetchError = false;
                const results = await Promise.allSettled([
                    this.fetchPairs(),
                    this.fetchDebates(),
                    this.fetchPlan(),
                    this.fetchStatus(),
                    this.fetchScores(),
                ]);
                // If all critical fetches failed, show error state
                if (results[0].status === 'rejected' && results[1].status === 'rejected') {
                    this.fetchError = true;
                }
                this.loading = false;
            },

            async fetchPairs() {
                const res = await fetch('/api/pairs');
                if (res.ok) {
                    const data = await res.json();
                    this.pairs = Array.isArray(data) ? data : [];
                } else {
                    throw new Error('fetch pairs: ' + res.status);
                }
            },

            async fetchDebates() {
                const res = await fetch('/api/debates');
                if (res.ok) {
                    const data = await res.json();
                    this.debates = Array.isArray(data) ? data : [];
                } else {
                    throw new Error('fetch debates: ' + res.status);
                }
            },

            async fetchPlan() {
                try {
                    const res = await fetch('/api/plan');
                    if (res.ok) {
                        this.plan = await res.json();
                    }
                } catch (e) { /* API may not be wired yet */ }
            },

            async fetchStatus() {
                try {
                    const res = await fetch('/api/status');
                    if (res.ok) {
                        const data = await res.json();
                        if (data) {
                            this._statusInfo = data;
                        }
                    }
                } catch (e) { /* API may not be wired yet */ }
            },

            async fetchScores() {
                // Abort any in-flight scores request to prevent race conditions
                if (this._scoresAbort) this._scoresAbort.abort();
                this._scoresAbort = new AbortController();
                try {
                    const res = await fetch('/api/scores', { signal: this._scoresAbort.signal });
                    if (res.ok) {
                        const data = await res.json();
                        this.scores = Array.isArray(data) ? data : [];
                        this.scoresError = false;
                    } else {
                        this.scoresError = true;
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        this.scoresError = true;
                    }
                } finally {
                    this._scoresAbort = null;
                }
            },

            sparklineSVG(data) {
                if (!Array.isArray(data) || data.length === 0) return '';
                // Sanitize to numbers only, NaN becomes 0
                const safe = data.map(v => { const n = Number(v); return isFinite(n) ? n : 0; });
                const w = 260, h = 32, pad = 2;
                const max = Math.max(...safe);
                const min = Math.min(Math.min(...safe), 0); // Anchor Y-axis at 0 for meaningful scale
                const range = max - min || 1;
                if (safe.length === 1) {
                    // Single data point: render a dot at center-x
                    const cx = w / 2;
                    const cy = h / 2;
                    return '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" role="presentation" style="display:block;width:100%;height:auto;">' +
                        '<circle cx="' + cx + '" cy="' + cy + '" r="2.5" fill="rgba(83,168,182,0.6)"/>' +
                        '</svg>';
                }
                const points = safe.map((v, i) => {
                    const x = pad + (i / (safe.length - 1)) * (w - 2 * pad);
                    const y = pad + (1 - (v - min) / range) * (h - 2 * pad);
                    return x.toFixed(1) + ',' + y.toFixed(1);
                }).join(' ');
                return '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" role="presentation" style="display:block;width:100%;height:auto;">' +
                    '<polyline fill="none" stroke="rgba(83,168,182,0.6)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" points="' + points + '"/>' +
                    '</svg>';
            },

            async fetchDebate(id, scrollToBottom) {
                try {
                    const res = await fetch('/api/debates/' + encodeURIComponent(id));
                    if (res.ok) {
                        this.currentDebate = await res.json();
                        if (scrollToBottom) {
                            this.$nextTick(() => {
                                const el = this.$refs.debateContent;
                                if (el) el.scrollTop = el.scrollHeight;
                            });
                        }
                    } else {
                        this.currentDebate = { id: id, _error: true, _status: res.status };
                    }
                } catch (e) {
                    this.currentDebate = { id: id, _error: true, _status: 0 };
                }
            },

            async openDebate(id) {
                this.view = 'debate';
                this.currentDebate = null;
                location.hash = 'debate/' + id;
                await this.fetchDebate(id, true);
            },

            handleHash() {
                const hash = location.hash.replace(/^#\/?/, '');
                if (hash.startsWith('debate/')) {
                    const id = hash.replace('debate/', '');
                    if (id) {
                        this.view = 'debate';
                        this.fetchDebate(id, true);
                        return;
                    }
                }
                if (hash === 'scores') {
                    this.view = 'scores';
                    this.currentDebate = null;
                    return;
                }
                if (hash === 'plan') {
                    this.view = 'plan';
                    this.currentDebate = null;
                    return;
                }
                if (hash === '' || hash === 'overview') {
                    this.view = 'overview';
                    this.currentDebate = null;
                }
            },

            upsertById(arr, item) {
                if (!item || !item.id) return;
                const idx = arr.findIndex(x => x.id === item.id);
                if (idx >= 0) {
                    arr[idx] = Object.assign(arr[idx], item);
                } else {
                    // Insert at front to maintain descending time order
                    arr.unshift(item);
                }
            },

            renderMarkdown(content) {
                if (typeof marked !== 'undefined' && marked.parse) {
                    const raw = marked.parse(content || '');
                    return this._sanitizeHTML(raw);
                }
                // Fallback: escape HTML and preserve newlines
                return (content || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\n/g, '<br>');
            },

            _sanitizeHTML(html) {
                // Strip dangerous tags and attributes from marked output.
                // Not a full sanitizer — use DOMPurify for untrusted input.
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const dangerous = doc.querySelectorAll(
                    'script, iframe, object, embed, form, link[rel=import], svg, math, style, base, meta, template, noscript, xmp, textarea, title'
                );
                dangerous.forEach(el => el.remove());
                // Dangerous URI protocols (case-insensitive, whitespace-trimmed)
                const dangerousProto = /^\s*(javascript|data|vbscript|blob)\s*:/i;
                // Attributes that can carry URIs
                const uriAttrs = new Set(['href', 'src', 'action', 'formaction', 'xlink:href', 'poster', 'background']);
                // Strip event-handler attributes and dangerous URIs from all elements
                doc.body.querySelectorAll('*').forEach(el => {
                    for (const attr of [...el.attributes]) {
                        const name = attr.name.toLowerCase();
                        if (name.startsWith('on') || name === 'srcdoc' || name === 'is') {
                            el.removeAttribute(attr.name);
                        } else if (uriAttrs.has(name) && dangerousProto.test(attr.value)) {
                            el.removeAttribute(attr.name);
                        }
                    }
                    // Enforce rel="noopener noreferrer" on links with target
                    if (el.tagName === 'A' && el.hasAttribute('target')) {
                        el.setAttribute('rel', 'noopener noreferrer');
                    }
                });
                return doc.body.innerHTML;
            },

            formatTime(ts) {
                if (!ts) return '—';
                const d = new Date(ts);
                if (isNaN(d.getTime())) return ts;
                return d.toLocaleString(undefined, {
                    month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
            },
        };
    }
</script>
