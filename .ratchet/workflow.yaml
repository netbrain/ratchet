version: 2
max_rounds: 3
escalation: human

workspaces:
  - path: .
    name: engine
  - path: monitor
    name: monitor

models:
  generative: opus
  adversarial: sonnet

progress:
  adapter: github-issues

components:
  - name: skills
    scope: "skills/*/SKILL.md"
    workflow: review-only

  - name: agents
    scope: "agents/*.md"
    workflow: review-only

  - name: scripts
    scope: "scripts/**/*.sh,install.sh"
    workflow: review-only

  - name: schemas
    scope: "schemas/*.json"
    workflow: review-only

pairs:
  - name: skill-coherence
    component: skills
    phase: review
    scope: "skills/*/SKILL.md"
    enabled: true

  - name: script-robustness
    component: scripts
    phase: review
    scope: "scripts/**/*.sh,install.sh"
    enabled: true

  - name: agent-effectiveness
    component: agents
    phase: review
    scope: "agents/*.md"
    enabled: true

  - name: schema-correctness
    component: schemas
    phase: review
    scope: "schemas/*.json"
    enabled: true

guards:
  - name: shellcheck
    command: "nix develop --command shellcheck scripts/**/*.sh install.sh"
    phase: review
    blocking: true
    timing: pre-debate
    components: [scripts]

  - name: schema-valid
    command: "nix develop --command jq empty schemas/workflow.schema.json"
    phase: review
    blocking: true
    timing: post-debate
    components: [schemas]
