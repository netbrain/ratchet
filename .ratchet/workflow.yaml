version: 2
max_rounds: 3
escalation: human

workspaces:
  - path: .
    name: engine
  - path: monitor
    name: monitor

models:
  generative: opus
  adversarial: sonnet

progress:
  adapter: github-issues
  publish_debates: per-round

components:
  - name: skills
    scope: "skills/*/SKILL.md"
    pipeline: review
    strategy: debate

  - name: agents
    scope: "agents/*.md"
    pipeline: review
    strategy: debate

  - name: scripts
    scope: "scripts/**/*.sh,install.sh"
    pipeline: review
    strategy: debate

  - name: schemas
    scope: "schemas/*.json"
    pipeline: review
    strategy: solo
    promote_on_guard_failure: true

pairs:
  - name: skill-coherence
    component: skills
    phase: review
    scope: "skills/*/SKILL.md"
    enabled: true

  - name: script-robustness
    component: scripts
    phase: review
    scope: "scripts/**/*.sh,install.sh"
    enabled: true

  - name: agent-effectiveness
    component: agents
    phase: review
    scope: "agents/*.md,.ratchet/pairs/*/generative.md,.ratchet/pairs/*/adversarial.md"
    enabled: true

  - name: schema-correctness
    component: schemas
    phase: review
    scope: "schemas/*.json"
    enabled: true

guards:
  - name: no-generated-files
    command: "bash scripts/check-generated-files.sh"
    phase: review
    blocking: true
    timing: pre-execution
    components: [skills, agents, scripts, schemas]

  - name: shellcheck
    command: "nix develop --command shellcheck scripts/**/*.sh install.sh"
    phase: review
    blocking: true
    timing: pre-execution
    components: [scripts]

  - name: stale-base
    command: "bash scripts/check-stale-base.sh --issue \"$RATCHET_ISSUE_REF\" --plan .ratchet/plan.yaml --worktree \"$RATCHET_WORKTREE\""
    phase: review
    blocking: true
    timing: pre-execution
    components: [skills, agents, scripts, schemas]

  - name: schema-valid
    command: |
      for schema in schemas/*.schema.json; do
        [ -f "$schema" ] || continue
        nix develop --command jq empty "$schema" || exit 1
      done
      if [ -f ".ratchet/workflow.yaml" ] && [ -f "schemas/workflow.schema.json" ]; then
        nix develop --command bash -c '
          if command -v check-jsonschema >/dev/null 2>&1; then
            yq -o json ".ratchet/workflow.yaml" | check-jsonschema --schemafile "schemas/workflow.schema.json" -
          else
            echo "Warning: check-jsonschema not available, skipping conformance validation" >&2
          fi
        ' || exit 1
      fi
    phase: review
    blocking: true
    timing: post-execution
    components: [schemas]

  - name: meta-json-valid
    command: |
      failed=0
      for f in .ratchet/debates/*/meta.json; do
        [ -f "$f" ] || continue
        verdict=$(jq -r '.verdict // ""' "$f" 2>/dev/null)
        rounds=$(jq -r '.rounds // .round_count // 0' "$f" 2>/dev/null)
        case "$verdict" in
          ACCEPT|CONDITIONAL_ACCEPT|TRIVIAL_ACCEPT|REJECT|REGRESS) ;;
          *) echo "INVALID verdict='$verdict' in $f" >&2; failed=1 ;;
        esac
        if [ "$rounds" -lt 1 ] 2>/dev/null; then
          echo "INVALID rounds=$rounds in $f" >&2; failed=1
        fi
      done
      exit $failed
    phase: review
    blocking: false
    timing: post-execution
    components: [skills, agents, scripts, schemas]

  - name: debate-artifacts-complete
    type: rationalization-check
    phase: review
    blocking: false
    timing: post-execution
    components: [skills, agents, scripts, schemas]
    checks:
      - assert: "All referenced debate IDs have artifact directories"
        command: |
          missing=0
          for id in $(yq -r '.. | .debates[]? // empty' .ratchet/plan.yaml 2>/dev/null); do
            [ -z "$id" ] && continue
            if [ ! -d ".ratchet/debates/$id" ] && ! find .ratchet/archive -name "$id" -type d 2>/dev/null | grep -q .; then
              echo "MISSING debate artifacts: $id" >&2; missing=1
            fi
          done
          exit $missing
      - assert: "Active debates have resolved timestamps"
        command: |
          for f in .ratchet/debates/*/meta.json; do
            [ -f "$f" ] || continue
            resolved=$(jq -r '.resolved // "null"' "$f")
            [ "$resolved" != "null" ] || { echo "UNRESOLVED: $f" >&2; exit 1; }
          done

  - name: plan-valid
    command: |
      if [ -f ".ratchet/plan.yaml" ] && [ -f "schemas/plan.schema.json" ]; then
        if command -v check-jsonschema >/dev/null 2>&1; then
          yq -o json ".ratchet/plan.yaml" | check-jsonschema --schemafile "schemas/plan.schema.json" -
        else
          echo "Warning: check-jsonschema not available, skipping plan validation" >&2
        fi
      fi
    phase: review
    blocking: false
    timing: post-execution
    components: [skills, agents, scripts, schemas]
